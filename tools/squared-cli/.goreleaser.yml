version: 2

project_name: squared

before:
  hooks:
    - ./sync-sdk.sh

builds:
  - main: .
    binary: squared
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "squared_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: learnqtkenya
    name: SquaredApp
  name_template: "squared-cli v{{ .Version }}"
